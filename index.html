<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Hub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bg-todo { background: linear-gradient(to right, #1e3c72, #2a5298); }
        .bg-progress { background: linear-gradient(to right, #ff8c00, #ed1c24); }
        .bg-done { background: linear-gradient(to right, #00b09b, #96c93d); }
        .bg-header { background: linear-gradient(to right, #232526, #414345); }
        .deadline-danger { animation: pulse 2s infinite; border: 2px solid #ef4444; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDyl2FoFZwKtFL6yb2sPEEWzJvBBzNK01A",
            authDomain: "taskhub-c3f41.firebaseapp.com",
            projectId: "taskhub-c3f41",
            storageBucket: "taskhub-c3f41.firebasestorage.app",
            messagingSenderId: "874827473111",
            appId: "1:874827473111:web:cdbd7c6b8d5ece0d285092"
        };

        // Khởi tạo Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Hằng số ứng dụng
        const TEAM_MEMBERS = ["Kiet Vu", "Trung Pham", "Hung Pham", "Huy Tang"];
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'taskhub-pro-v1';

        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [username, setUsername] = useState(() => localStorage.getItem('hub_user') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('hub_user'));
            const [tasks, setTasks] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [view, setView] = useState('board');
            const [errorMsg, setErrorMsg] = useState('');
            
            // State của Form
            const [newTitle, setNewTitle] = useState('');
            const [newAssignee, setNewAssignee] = useState(TEAM_MEMBERS[0]);
            const [newDueDate, setNewDueDate] = useState('');
            const [isWeekly, setIsWeekly] = useState(false);

            // Cấu trúc đường dẫn bắt buộc: /artifacts/{appId}/public/data/{collectionName}
            const collectionRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('team_tasks');

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // Thử đăng nhập bằng Custom Token nếu có
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await auth.signInWithCustomToken(__initial_auth_token);
                            } catch (tokenErr) {
                                // Nếu token không khớp (audience mismatch), thử đăng nhập ẩn danh
                                console.warn("Custom token failed, falling back to anonymous:", tokenErr);
                                await auth.signInAnonymously();
                            }
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Xác thực thất bại:", err);
                        setErrorMsg("Lỗi xác thực: " + err.message);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                // Chỉ truy vấn sau khi đã xác thực và đăng nhập tên người dùng
                if (!user || !isLoggedIn) return;

                const unsubscribe = collectionRef.onSnapshot(
                    (snapshot) => {
                        setErrorMsg('');
                        const now = Date.now();
                        const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
                        
                        const allTasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        
                        const filtered = allTasks.filter(task => {
                            if (task.status === 'done' && task.completedAt) {
                                return (now - task.completedAt) < threeDaysMs;
                            }
                            return task.status !== 'cancelled';
                        });

                        // Sắp xếp thủ công để tránh yêu cầu Index phức tạp trên Firestore
                        filtered.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
                        setTasks(filtered);
                    },
                    (err) => {
                        console.error("Lỗi Firestore:", err);
                        setErrorMsg("Lỗi truy cập dữ liệu: " + err.message);
                    }
                );

                return () => unsubscribe();
            }, [user, isLoggedIn]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const handleLogin = (name) => {
                localStorage.setItem('hub_user', name);
                setUsername(name);
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                localStorage.removeItem('hub_user');
                setIsLoggedIn(false);
                setUsername('');
            };

            const createTask = async () => {
                if (!newTitle || !newDueDate) return alert("Vui lòng điền đầy đủ thông tin.");
                if (!user) return alert("Vui lòng đợi xác thực hệ thống...");

                try {
                    await collectionRef.add({
                        title: newTitle,
                        assignee: newAssignee,
                        dueDate: newDueDate,
                        isWeekly: isWeekly,
                        status: 'todo',
                        progress: 0,
                        createdAt: Date.now(),
                        createdBy: username
                    });
                    setNewTitle('');
                    setIsModalOpen(false);
                } catch (err) {
                    console.error("Lỗi thêm task:", err);
                    alert("Lỗi phân quyền. Vui lòng kiểm tra Firestore Rules.");
                }
            };

            const updateTaskStatus = async (task, newStatus) => {
                if (!user) return;
                let updates = { status: newStatus };
                
                if (newStatus === 'done') {
                    updates.completedAt = Date.now();
                    updates.progress = 100;
                    
                    if (task.isWeekly) {
                        const nextWeek = new Date(task.dueDate);
                        nextWeek.setDate(nextWeek.getDate() + 7);
                        try {
                            await collectionRef.add({
                                ...task,
                                id: null,
                                status: 'todo',
                                progress: 0,
                                dueDate: nextWeek.toISOString().split('T')[0],
                                completedAt: null
                            });
                        } catch (err) { console.error("Lỗi tạo task lặp lại:", err); }
                    }
                }

                try {
                    await collectionRef.doc(task.id).update(updates);
                } catch (err) {
                    console.error("Lỗi cập nhật task:", err);
                }
            };

            const checkDeadline = (dateStr) => {
                if (!dateStr) return false;
                const diff = (new Date(dateStr) - new Date()) / (1000 * 60 * 60 * 24);
                return diff >= 0 && diff <= 3;
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-header p-4 text-white">
                        <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-slate-800 text-center">
                            <h2 className="text-2xl font-black mb-6 uppercase tracking-tighter">Xác minh danh tính</h2>
                            <div className="grid gap-3">
                                {TEAM_MEMBERS.map(m => (
                                    <button key={m} onClick={() => handleLogin(m)} className="py-4 border-2 border-slate-100 rounded-2xl font-bold hover:bg-blue-600 hover:text-white transition-all">
                                        {m}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col relative">
                    <header className="bg-header text-white px-8 py-6 flex flex-wrap gap-4 justify-between items-center shadow-xl z-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-white/20 p-2 rounded-lg"><i data-lucide="layers"></i></div>
                            <h1 className="text-2xl font-black tracking-tighter uppercase">Task Hub Pro</h1>
                        </div>
                        <div className="flex flex-wrap gap-4 items-center">
                            <div className="flex bg-white/10 rounded-xl p-1">
                                <button onClick={() => setView('board')} className={`px-4 py-2 rounded-lg text-xs font-bold ${view==='board'?'bg-white text-slate-900 shadow':'text-white'}`}>BOARD</button>
                                <button onClick={() => setView('calendar')} className={`px-4 py-2 rounded-lg text-xs font-bold ${view==='calendar'?'bg-white text-slate-900 shadow':'text-white'}`}>CALENDAR</button>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-500 hover:bg-blue-400 px-6 py-2 rounded-xl font-black text-sm transition-all">+ TẠO TASK</button>
                            <button onClick={handleLogout} className="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-xl font-black text-sm transition-all" title="Đăng xuất"><i data-lucide="log-out" className="w-5 h-5"></i></button>
                        </div>
                    </header>

                    {errorMsg && (
                        <div className="bg-red-600 text-white p-4 font-bold flex items-center justify-center gap-3 shadow-md z-20">
                            <i data-lucide="shield-alert"></i>
                            <span className="text-sm">{errorMsg}</span>
                        </div>
                    )}

                    <main className="flex-1 p-8">
                        {view === 'board' ? (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {['todo', 'in_progress', 'done'].map(status => (
                                    <div key={status} className="flex flex-col gap-6">
                                        <div className={`p-4 rounded-2xl text-white font-black uppercase tracking-widest text-center shadow-lg ${status==='todo'?'bg-todo':status==='in_progress'?'bg-progress':'bg-done'}`}>
                                            {status === 'todo' ? 'Cần làm' : status === 'in_progress' ? 'Đang thực hiện' : 'Hoàn thành'}
                                        </div>
                                        <div className="flex flex-col gap-4">
                                            {tasks.filter(t => t.status === status).map(task => (
                                                <div key={task.id} className={`bg-white p-6 rounded-3xl shadow-sm border border-slate-200 transition-all hover:shadow-xl ${checkDeadline(task.dueDate) && status !== 'done' ? 'deadline-danger' : ''}`}>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <h4 className="font-black text-slate-800 text-lg leading-tight">{task.title}</h4>
                                                        {task.isWeekly && <span className="bg-blue-100 text-blue-600 text-[10px] font-black px-2 py-1 rounded-md uppercase">Hàng tuần</span>}
                                                    </div>
                                                    
                                                    <div className="grid grid-cols-2 gap-4 mb-6 text-xs">
                                                        <div><p className="text-slate-400 uppercase font-bold mb-1">Người thực hiện</p><p className="font-black text-slate-700">{task.assignee}</p></div>
                                                        <div><p className="text-slate-400 uppercase font-bold mb-1">Hạn chót</p><p className={`font-black ${checkDeadline(task.dueDate)?'text-red-500':'text-slate-700'}`}>{task.dueDate}</p></div>
                                                    </div>

                                                    {status === 'in_progress' && (
                                                        <div className="mb-6">
                                                            <p className="text-[10px] font-black uppercase text-slate-400 mb-2">Tiến độ: {task.progress || 0}%</p>
                                                            <div className="flex gap-1">
                                                                {[10, 30, 60, 90].map(lv => (
                                                                    <button key={lv} onClick={() => collectionRef.doc(task.id).update({progress: lv})} className={`flex-1 py-1 rounded text-[10px] font-bold transition-all ${task.progress === lv ? 'bg-orange-500 text-white':'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>{lv}%</button>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}

                                                    <div className="flex gap-2">
                                                        {status !== 'done' && <button onClick={() => updateTaskStatus(task, status === 'todo' ? 'in_progress' : 'done')} className="flex-1 py-3 bg-slate-900 text-white rounded-xl font-black uppercase text-xs tracking-widest hover:bg-blue-600 transition-colors">Tiếp theo</button>}
                                                        <button onClick={() => collectionRef.doc(task.id).update({status: 'cancelled'})} className="p-3 text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-3xl p-8 shadow-xl border border-slate-200">
                                <h2 className="text-xl font-black mb-6 uppercase tracking-tight">Lịch trình của bạn ({username})</h2>
                                <div className="space-y-4">
                                    {tasks.filter(t => t.assignee === username).map(t => (
                                        <div key={t.id} className="flex items-center justify-between p-4 border-l-4 border-blue-500 bg-slate-50 rounded-r-xl">
                                            <div>
                                                <p className="font-black text-slate-800">{t.title}</p>
                                                <p className="text-xs font-bold text-slate-400">{t.dueDate} • Trạng thái: <span className="uppercase text-blue-600">{t.status}</span></p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[10px] font-black text-slate-300 uppercase">Độ ưu tiên</p>
                                                <p className={`text-sm font-black ${checkDeadline(t.dueDate)?'text-red-500':'text-green-500'}`}>{checkDeadline(t.dueDate)?'Khẩn cấp':'Đúng hạn'}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {tasks.filter(t => t.assignee === username).length === 0 && (
                                        <p className="text-center text-slate-400 font-bold py-10">Bạn không có task nào được giao.</p>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-10 rounded-[40px] w-full max-w-lg shadow-2xl animate-in fade-in zoom-in duration-300">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase tracking-tighter text-slate-800">Tạo nhiệm vụ mới</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-300 hover:text-slate-600"><i data-lucide="x" className="w-8 h-8"></i></button>
                                </div>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Tiêu đề</label>
                                        <input className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl font-bold outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" placeholder="Mô tả ngắn gọn..." value={newTitle} onChange={e => setNewTitle(e.target.value)} />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Người thực hiện</label>
                                            <select className="w-full px-4 py-4 bg-slate-50 border-none rounded-2xl font-bold outline-none" value={newAssignee} onChange={e => setNewAssignee(e.target.value)}>
                                                {TEAM_MEMBERS.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest">Hạn chót</label>
                                            <input type="date" className="w-full px-4 py-4 bg-slate-50 border-none rounded-2xl font-bold outline-none" value={newDueDate} onChange={e => setNewDueDate(e.target.value)} />
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-3 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                        <input type="checkbox" id="weekly" className="w-5 h-5 rounded border-blue-300 text-blue-600 focus:ring-blue-500" checked={isWeekly} onChange={e => setIsWeekly(e.target.checked)} />
                                        <label htmlFor="weekly" className="text-sm font-black text-blue-700 uppercase tracking-tight cursor-pointer">Nhiệm vụ lặp lại hàng tuần</label>
                                    </div>

                                    <button onClick={createTask} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl hover:bg-blue-600 transition-all flex items-center justify-center gap-3">
                                        <i data-lucide="rocket" className="w-5 h-5"></i>
                                        Triển khai
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
