<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Hub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bg-todo { background: linear-gradient(to right, #1e3c72, #2a5298); }
        .bg-progress { background: linear-gradient(to right, #ff8c00, #ed1c24); }
        .bg-done { background: linear-gradient(to right, #00b09b, #96c93d); }
        .bg-header { background: linear-gradient(to right, #232526, #414345); }
        .bg-cs-header { background: linear-gradient(to right, #0f172a, #334155); }
        
        .task-list { 
            max-height: calc(100vh - 250px); 
            overflow-y: auto; 
            padding-right: 4px; 
            padding-top: 24px; 
        }
        .task-list::-webkit-scrollbar { width: 4px; }
        .task-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .task-card, .cs-card { transition: all 0.2s ease; }
        .task-card:hover, .cs-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.15); }
        
        @keyframes subtle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .animate-tag { animation: subtle-bounce 2s infinite ease-in-out; }
        .status-header { position: sticky; top: -12px; z-index: 30; }
        textarea { resize: none; }
        
        /* Custom scroll for table */
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyDyl2FoFZwKtFL6yb2sPEEWzJvBBzNK01A",
            authDomain: "taskhub-c3f41.firebaseapp.com",
            projectId: "taskhub-c3f41",
            storageBucket: "taskhub-c3f41.firebasestorage.app",
            messagingSenderId: "874827473111",
            appId: "1:874827473111:web:cdbd7c6b8d5ece0d285092"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const TEAM_MEMBERS = ["Kiet Vu", "Trung Pham", "Hung Pham", "Huy Tang"];
        const MANAGER_NAME = "Kiet Vu";
        const REGIONS = ["UK", "SA"];
        const PRODUCTS = ["Roof Truss", "Posi Floor", "I-Joists Floor", "Wall Panels", "Ultra-Span", "Cassettes"];
        
        const ASSIGNEE_COLORS = {
            "Kiet Vu": { bg: "#E0F2FE", text: "#0369a1", border: "#bae6fd", accent: "#0ea5e9" },
            "Trung Pham": { bg: "#FEF3C7", text: "#92400e", border: "#fde68a", accent: "#f59e0b" },
            "Hung Pham": { bg: "#DCFCE7", text: "#166534", border: "#bbf7d0", accent: "#10b981" },
            "Huy Tang": { bg: "#F3E8FF", text: "#6b21a8", border: "#e9d5ff", accent: "#8b5cf6" },
            "Default": { bg: "#F8FAFC", text: "#475569", border: "#e2e8f0", accent: "#64748b" }
        };

        const RATING_LEVELS = [
            { id: 'stable', label: 'Stable', color: 'text-green-600', bg: 'bg-green-50', border: 'border-green-200' },
            { id: 'at-risk', label: 'At-risk', color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-200' },
            { id: 'critical', label: 'Critical', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-200' }
        ];

        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'taskhub-pro-v1';

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [activeHub, setActiveHub] = useState(null); 
            const [user, setUser] = useState(null);
            const [lang, setLang] = useState('EN'); 
            const [username, setUsername] = useState(() => localStorage.getItem('hub_user') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('hub_user'));
            const [tasks, setTasks] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [view, setView] = useState('board');
            const [csView, setCsView] = useState('list');
            const [searchQuery, setSearchQuery] = useState('');
            const [csHistory, setCsHistory] = useState([]);
            const [selectedWeekId, setSelectedWeekId] = useState('current');
            
            // Task Form States
            const [newTitle, setNewTitle] = useState('');
            const [newAssignee, setNewAssignee] = useState(TEAM_MEMBERS[0]);
            const [newDueDate, setNewDueDate] = useState('');
            const [isWeekly, setIsWeekly] = useState(false);

            // CS Form States
            const [newCsName, setNewCsName] = useState('');
            const [newCsRegion, setNewCsRegion] = useState(REGIONS[0]);
            const [newCsTL, setNewCsTL] = useState(TEAM_MEMBERS[0]);
            const [selectedProducts, setSelectedProducts] = useState([]);
            const [newCsStatus, setNewCsStatus] = useState('Invoiced');

            const taskCol = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('team_tasks');
            const csCol = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('customers');
            const csHistoryCol = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('cs_history');

            const translations = {
                EN: {
                    todo: "To-do", in_progress: "In Progress", done: "Completed",
                    new: "+ NEW", start: "Start", finish: "Finish",
                    weekly: "Weekly Recurring", deadline: "Approaching deadline!!",
                    verify: "Verify Identity", board: "BOARD", calendar: "SCHEDULE",
                    task_name: "Task name...", create: "Deploy", gold_tag: "Add Gold Tag (Weekly)",
                    cs_title: "CS Hub", back: "Back to Hubs",
                    reviewed: "Reviewed", waiting: "Waiting Review", confirm: "Confirm Review",
                    reset: "Reset Review", grid: "GRID", list: "LIST", search: "Search client...",
                    mgr: "(Mgr)", workspace_choice: "Workspace Choice", logged_in_as: "Logged in as",
                    task_hub_title: "Task Hub Pro", overview_hub: "Overview Hub", sign_out: "Sign Out",
                    current_week: "Current Week", close_week: "Close Week", client_ratings_overview: "Client Ratings Overview",
                    aggregated_from: "Aggregated from CS Hub", status_overview: "Status", loading_charts: "Loading Charts...",
                    client_info: "Client Info", assignee: "Assignee", workload: "Workload", communication: "COM",
                    quality: "Quality", actions: "Actions", trial: "TRIAL", reason: "Reason...", note: "Note...",
                    new_task: "New Task", add_client: "Add Client", client_name: "Client Name", enter_name: "Enter name...",
                    status_label: "Status", region: "Region", products: "Products", tl_in_charge: "TL In Charge",
                    deploy_client: "Deploy Client", progress: "Progress", delete_client: "Delete Client"
                },
                VN: {
                    todo: "Cần làm", in_progress: "Đang tiến hành", done: "Hoàn thành",
                    new: "+ MỚI", start: "Bắt đầu", finish: "Xong",
                    weekly: "Lặp lại hàng tuần", deadline: "Sắp đến hạn!!",
                    verify: "Xác minh danh tính", board: "BẢNG", calendar: "LỊCH TRÌNH",
                    task_name: "Tên nhiệm vụ...", create: "Triển khai", gold_tag: "Thêm Gold Tag (Hàng tuần)",
                    cs_title: "CS Hub", back: "Quay lại Hubs",
                    reviewed: "Đã duyệt", waiting: "Chờ duyệt", confirm: "Xác nhận Duyệt",
                    reset: "Làm mới tuần", grid: "LƯỚI", list: "DANH SÁCH", search: "Tìm khách hàng...",
                    mgr: "(Quản lý)", workspace_choice: "Lựa chọn không gian", logged_in_as: "Đăng nhập với tên",
                    task_hub_title: "Task Hub Pro", overview_hub: "Tổng Quan", sign_out: "Đăng xuất",
                    current_week: "Tuần Hiện Tại", close_week: "Chốt Tuần", client_ratings_overview: "Tổng quan đánh giá khách hàng",
                    aggregated_from: "Tổng hợp từ CS Hub", status_overview: "Trạng thái", loading_charts: "Đang tải biểu đồ...",
                    client_info: "Thông tin KH", assignee: "Người phụ trách", workload: "Khối lượng", communication: "Giao tiếp",
                    quality: "Chất lượng", actions: "Thao tác", trial: "DÙNG THỬ", reason: "Lý do...", note: "Ghi chú...",
                    new_task: "Nhiệm vụ mới", add_client: "Thêm khách hàng", client_name: "Tên khách hàng", enter_name: "Nhập tên...",
                    status_label: "Trạng thái", region: "Khu vực", products: "Sản phẩm", tl_in_charge: "Trưởng nhóm",
                    deploy_client: "Triển khai", progress: "Tiến độ", delete_client: "Xóa KH"
                }
            };
            const t = translations[lang];

            useEffect(() => {
                auth.signInAnonymously();
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            const shouldShowTask = (task) => {
                if (task.status !== 'todo') return true;
                if (!task.isWeekly || !task.nextOccurrence) return true;
                const now = new Date();
                return now >= new Date(task.nextOccurrence);
            };

            useEffect(() => {
                if (!user || !isLoggedIn) return;
                
                const unsubTasks = taskCol.onSnapshot((snapshot) => {
                    const now = Date.now();
                    const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
                    const all = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    const filtered = all.filter(task => {
                        if (task.status === 'cancelled') return false;
                        if (task.status === 'done' && task.completedAt) {
                            return (now - task.completedAt) < threeDaysMs;
                        }
                        return shouldShowTask(task);
                    });
                    
                    filtered.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
                    setTasks(filtered);
                });

                const unsubCs = csCol.onSnapshot((snapshot) => {
                    setCustomers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubHistory = csHistoryCol.orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                    setCsHistory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => { unsubTasks(); unsubCs(); unsubHistory(); };
            }, [user, isLoggedIn]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const filteredCustomers = useMemo(() => {
                return customers.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [customers, searchQuery]);

            const checkPermission = (item) => {
                if (username === MANAGER_NAME) return true;
                if (username === "Guest") return false;
                if (item.createdBy === username || item.assignee === username || item.tlInCharge === username) return true;
                return false;
            };

            const handleLogin = (name) => {
                localStorage.setItem('hub_user', name);
                setUsername(name);
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                localStorage.removeItem('hub_user');
                setIsLoggedIn(false);
                setUsername('');
                setActiveHub(null);
            };

            const toggleProduct = (prod) => {
                setSelectedProducts(prev => 
                    prev.includes(prod) ? prev.filter(p => p !== prod) : [...prev, prod]
                );
            };

            const createTask = async () => {
                if (!newTitle || !newDueDate || username === "Guest") return;
                await taskCol.add({
                    title: newTitle, assignee: newAssignee, dueDate: newDueDate,
                    isWeekly: isWeekly, status: 'todo', progress: 0,
                    createdAt: Date.now(), createdBy: username,
                    nextOccurrence: null
                });
                setNewTitle(''); setIsModalOpen(false);
            };

            const createCustomer = async () => {
                if (!newCsName || username === "Guest") return;
                await csCol.add({
                    name: newCsName, 
                    region: newCsRegion, 
                    tlInCharge: newCsTL,
                    products: selectedProducts.join(", "), 
                    status: newCsStatus,
                    ratings: { workload: 'stable', communication: 'stable', quality: 'stable' },
                    comments: { workload: '', communication: '', quality: '' },
                    reviewed: false, createdAt: Date.now(), createdBy: username
                });
                setNewCsName(''); 
                setSelectedProducts([]);
                setNewCsStatus('Invoiced');
                setIsModalOpen(false);
            };

            const deleteCustomer = async (id) => {
                if (username === "Guest") return;
                await csCol.doc(id).delete();
            };

            const getNextMonday7AM = (fromDate) => {
                const date = new Date(fromDate);
                const day = date.getDay();
                const diff = (day === 0 ? 1 : 8 - day); 
                date.setDate(date.getDate() + diff);
                date.setHours(7, 0, 0, 0);
                return date.toISOString();
            };

            const updateTaskProgress = async (task, value) => {
                if (!checkPermission(task) || username === "Guest") return;
                let updates = { progress: value };
                if (value === 100) {
                    updates.status = 'done';
                    updates.completedAt = Date.now();
                    if (task.isWeekly) {
                        const nextDueDate = new Date(task.dueDate);
                        nextDueDate.setDate(nextDueDate.getDate() + 7);
                        const nextShowDate = getNextMonday7AM(new Date());
                        await taskCol.add({ ...task, id: null, status: 'todo', progress: 0, dueDate: nextDueDate.toISOString().split('T')[0], completedAt: null, nextOccurrence: nextShowDate });
                    }
                } else if (value > 0) updates.status = 'in_progress';
                else updates.status = 'todo';
                await taskCol.doc(task.id).update(updates);
            };

            const updateCsRating = async (id, field, level) => {
                if (username === "Guest") return;
                await csCol.doc(id).update({ [`ratings.${field}`]: level, reviewed: false });
            };

            const updateCsComment = async (id, field, text) => {
                if (username === "Guest") return;
                await csCol.doc(id).update({ [`comments.${field}`]: text, reviewed: false });
            };

            const markAsReviewed = async (cs) => {
                if (username !== MANAGER_NAME) return;
                if (cs.reviewed) {
                    await csCol.doc(cs.id).update({
                        reviewed: false,
                        ratings: { workload: 'stable', communication: 'stable', quality: 'stable' },
                        comments: { workload: '', communication: '', quality: '' }
                    });
                } else {
                    await csCol.doc(cs.id).update({ reviewed: true });
                }
            };

            const isApproachingDeadline = (dueDateStr) => {
                const today = new Date();
                today.setHours(0,0,0,0);
                const dueDate = new Date(dueDateStr);
                dueDate.setHours(0,0,0,0);
                return dueDate <= today;
            };

            const getWeekString = () => {
                const d = new Date();
                d.setHours(0,0,0,0);
                d.setDate(d.getDate() + 4 - (d.getDay()||7));
                const yearStart = new Date(d.getFullYear(),0,1);
                const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
                return `Week ${weekNo}, ${d.getFullYear()}`;
            };

            const formatDisplayWeek = (weekName) => {
                if (!weekName) return '';
                return lang === 'VN' ? weekName.replace('Week', 'Tuần') : weekName;
            };

            const closeWeek = async () => {
                if (username !== MANAGER_NAME) return;
                const weekStr = getWeekString();
                
                await csHistoryCol.add({
                    weekName: weekStr,
                    createdAt: Date.now(),
                    customersData: customers
                });

                const batch = db.batch();
                customers.forEach(cs => {
                    const ref = csCol.doc(cs.id);
                    batch.update(ref, {
                        reviewed: false,
                        ratings: { workload: 'stable', communication: 'stable', quality: 'stable' },
                        comments: { workload: '', communication: '', quality: '' }
                    });
                });
                await batch.commit();
            };

            const getCombinedOverviewData = () => {
                const counts = [
                    { id: 'stable', name: 'Stable', workload: 0, communication: 0, quality: 0, workloadClients: [], communicationClients: [], qualityClients: [] },
                    { id: 'at-risk', name: 'At-risk', workload: 0, communication: 0, quality: 0, workloadClients: [], communicationClients: [], qualityClients: [] },
                    { id: 'critical', name: 'Critical', workload: 0, communication: 0, quality: 0, workloadClients: [], communicationClients: [], qualityClients: [] }
                ];
                
                const dataToUse = selectedWeekId === 'current' 
                    ? customers 
                    : (csHistory.find(h => h.id === selectedWeekId)?.customersData || []);
                    
                dataToUse.forEach(cs => {
                    if (cs.ratings) {
                        const sl = counts.find(c => c.id === cs.ratings.workload);
                        if (sl) { sl.workload++; sl.workloadClients.push(cs.name); }
                        const cl = counts.find(c => c.id === cs.ratings.communication);
                        if (cl) { cl.communication++; cl.communicationClients.push(cs.name); }
                        const ql = counts.find(c => c.id === cs.ratings.quality);
                        if (ql) { ql.quality++; ql.qualityClients.push(cs.name); }
                    }
                });
                
                return counts.map(c => ({
                    ...c,
                    total: c.workload + c.communication + c.quality
                }));
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#0033a0] p-4 relative">
                        <div className="absolute top-8 left-10">
                            <span className="font-bold text-white text-5xl tracking-tight select-none">MiTek<sup className="text-2xl font-semibold">®</sup></span>
                        </div>
                        <div className="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-sm text-center z-10">
                            <h2 className="text-2xl font-black mb-8 uppercase tracking-tighter text-slate-800">{t.verify}</h2>
                            <div className="grid gap-3">
                                {[...TEAM_MEMBERS, "Guest"].map(m => (
                                    <button key={m} onClick={() => handleLogin(m)} className="py-4 bg-slate-50 border-2 border-transparent hover:border-blue-500 rounded-2xl font-bold transition-all text-slate-600 shadow-sm">{m} {m === MANAGER_NAME ? t.mgr : ""}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (!activeHub) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#0033a0] p-6 relative">
                        <div className="text-center mb-12 z-10">
                            <h2 className="text-4xl font-black uppercase tracking-tighter text-white mb-2">{t.workspace_choice}</h2>
                            <p className="text-blue-200 font-bold text-xs uppercase tracking-widest">{t.logged_in_as} {username}</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl z-10">
                            <div onClick={() => setActiveHub('task')} className="group bg-white p-10 rounded-[48px] border-4 border-transparent hover:border-blue-400 cursor-pointer transition-all shadow-xl flex flex-col items-center hover:-translate-y-2">
                                <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg group-hover:scale-110 transition-transform">
                                    <i data-lucide="layout-dashboard" className="text-white"></i>
                                </div>
                                <h3 className="text-xl font-black uppercase text-slate-800 text-center">{t.task_hub_title}</h3>
                            </div>
                            <div onClick={() => setActiveHub('cs')} className="group bg-white p-10 rounded-[48px] border-4 border-transparent hover:border-emerald-400 cursor-pointer transition-all shadow-xl flex flex-col items-center hover:-translate-y-2">
                                <div className="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg group-hover:scale-110 transition-transform">
                                    <i data-lucide="users" className="text-white"></i>
                                </div>
                                <h3 className="text-xl font-black uppercase text-slate-800 text-center">{t.cs_title}</h3>
                            </div>
                            <div onClick={() => setActiveHub('overview')} className="group bg-white p-10 rounded-[48px] border-4 border-transparent hover:border-purple-400 cursor-pointer transition-all shadow-xl flex flex-col items-center hover:-translate-y-2">
                                <div className="w-16 h-16 bg-purple-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg group-hover:scale-110 transition-transform">
                                    <i data-lucide="bar-chart-2" className="text-white"></i>
                                </div>
                                <h3 className="text-xl font-black uppercase text-slate-800 text-center">{t.overview_hub}</h3>
                            </div>
                        </div>
                        <button onClick={handleLogout} className="mt-12 text-blue-200 hover:text-white font-black uppercase text-[10px] tracking-widest flex items-center gap-2 transition-colors z-10"><i data-lucide="log-out" className="w-4 h-4"></i> {t.sign_out}</button>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col h-screen overflow-hidden">
                    <header className={`${activeHub === 'task' ? 'bg-header' : activeHub === 'cs' ? 'bg-cs-header' : 'bg-gradient-to-r from-purple-900 to-indigo-900'} text-white px-6 py-4 flex justify-between items-center shadow-xl z-50`}>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setActiveHub(null)} title={t.back} className="p-2 hover:bg-white/10 rounded-full transition-colors flex items-center justify-center">
                                <i data-lucide="arrow-left" className="w-5 h-5"></i>
                            </button>
                            <h1 className="text-lg font-black uppercase tracking-tighter">{activeHub === 'task' ? t.task_hub_title : activeHub === 'cs' ? t.cs_title : t.overview_hub}</h1>
                        </div>
                        
                        <div className="flex gap-3 items-center">
                            {activeHub === 'cs' && (
                                <div className="flex items-center bg-white/10 rounded-xl px-3 py-1.5 border border-white/20 gap-2 focus-within:bg-white/20 transition-all">
                                    <i data-lucide="search" className="w-3.5 h-3.5 text-white/50"></i>
                                    <input 
                                        type="text" 
                                        className="bg-transparent border-none outline-none text-[11px] font-bold text-white placeholder:text-white/30 w-32 md:w-48" 
                                        placeholder={t.search}
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                            )}
                            <div className="flex bg-white/10 p-1 rounded-xl border border-white/10">
                                {['EN', 'VN'].map(l => (
                                    <button key={l} onClick={() => setLang(l)} className={`px-3 py-1 text-[9px] font-black rounded-lg transition-all ${lang === l ? 'bg-white text-slate-900 shadow-md' : 'text-white/50 hover:text-white'}`}>{l}</button>
                                ))}
                            </div>
                            {activeHub === 'task' ? (
                                <div className="flex bg-white/10 rounded-xl p-1 border border-white/10">
                                    <button onClick={() => setView('board')} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold ${view==='board'?'bg-white text-slate-900 shadow':'text-white'}`}>{t.board}</button>

                                ) : (
                                    <div className="space-y-4">
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">{t.client_name}</label><input className="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl font-bold text-sm outline-none" placeholder={t.enter_name} value={newCsName} onChange={e => setNewCsName(e.target.value)} /></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">{t.status_label}</label><div className="flex gap-2 p-1 bg-slate-50 rounded-xl border border-slate-100">{['Invoiced', 'Trial'].map(s => (<button key={s} onClick={() => setNewCsStatus(s)} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg transition-all ${newCsStatus === s ? (s === 'Trial' ? 'bg-red-700 text-white shadow-md' : 'bg-slate-900 text-white shadow-md') : 'text-slate-400 hover:text-slate-600'}`}>{s === 'Trial' ? t.trial : s}</button>))}</div></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">{t.region}</label><select className="w-full px-4 py-4 bg-slate-50 border-none rounded-xl font-bold text-xs outline-none cursor-pointer" value={newCsRegion} onChange={e => setNewCsRegion(e.target.value)}>{REGIONS.map(r => <option key={r} value={r}>{r}</option>)}</select></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">{t.products}</label><div className="grid grid-cols-1 gap-2 bg-slate-50 p-4 rounded-2xl border border-slate-100 max-h-40 overflow-y-auto">{PRODUCTS.map(prod => (<label key={prod} className="flex items-center gap-3 cursor-pointer group"><input type="checkbox" className="w-5 h-5 rounded-lg border-2 border-slate-200 text-emerald-600" checked={selectedProducts.includes(prod)} onChange={() => toggleProduct(prod)}/><span className={`text-[11px] font-bold uppercase transition-colors ${selectedProducts.includes(prod) ? 'text-emerald-700' : 'text-slate-500'}`}>{prod}</span></label>))}</div></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">{t.tl_in_charge}</label><select className="w-full px-4 py-4 bg-slate-50 border-none rounded-xl font-bold text-xs outline-none cursor-pointer" value={newCsTL} onChange={e => setNewCsTL(e.target.value)}>{TEAM_MEMBERS.map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                                        <button onClick={createCustomer} className="w-full py-5 bg-emerald-600 text-white rounded-[24px] font-black uppercase text-sm tracking-widest shadow-lg hover:bg-emerald-500 transition-all mt-4">{t.deploy_client}</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
