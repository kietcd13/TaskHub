<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel (Để trình duyệt đọc được JSX trực tiếp) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        // Firebase Imports từ CDN (phiên bản ESM)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        const LOCAL_FIREBASE_CONFIG = {
            apiKey: "AIzaSyDyl2FoFZwKtFL6yb2sPEEWzJvBBzNK01A",
            authDomain: "taskhub-c3f41.firebaseapp.com",
            projectId: "taskhub-c3f41",
            storageBucket: "taskhub-c3f41.firebasestorage.app",
            messagingSenderId: "874827473111",
            appId: "1:874827473111:web:cdbd7c6b8d5ece0d285092",
            measurementId: "G-2EWMV1JJMK"
        };

        const app = initializeApp(LOCAL_FIREBASE_CONFIG);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'github-deployment';

        function App() {
            const [user, setUser] = useState(null);
            const [username, setUsername] = useState(() => localStorage.getItem('task_hub_username') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('task_hub_is_logged_in') === 'true');
            const [tasks, setTasks] = useState([]);
            const [viewMode, setViewMode] = useState('board');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newTaskTitle, setNewTaskTitle] = useState('');

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user || !isLoggedIn) return;
                const path = `artifacts/${appId}/public/data/team_tasks`;
                return onSnapshot(collection(db, path), (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setTasks(data.sort((a, b) => b.createdAt - a.createdAt));
                });
            }, [user, isLoggedIn]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (username.trim()) {
                    localStorage.setItem('task_hub_username', username);
                    localStorage.setItem('task_hub_is_logged_in', 'true');
                    setIsLoggedIn(true);
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                            <h2 className="text-2xl font-bold mb-6">Task Hub Login</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input required type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder="Tên của bạn" className="w-full p-3 border rounded-xl" />
                                <button className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Bắt đầu</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-blue-700 p-4 text-white flex justify-between items-center shadow-md">
                        <h1 className="font-bold uppercase tracking-wider">Task Hub</h1>
                        <button onClick={() => setIsModalOpen(true)} className="bg-white text-blue-700 px-4 py-2 rounded-lg font-bold text-sm">Thêm Task</button>
                    </header>
                    
                    <main className="max-w-6xl mx-auto p-6">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {['todo', 'in_progress', 'done'].map(status => (
                                <div key={status} className="bg-slate-200/50 p-4 rounded-xl min-h-[300px]">
                                    <h3 className="font-bold text-slate-500 uppercase text-xs mb-4">{status}</h3>
                                    {tasks.filter(t => t.status === status).map(task => (
                                        <div key={task.id} className="bg-white p-4 rounded-lg shadow-sm mb-3">
                                            <p className="font-bold">{task.title}</p>
                                            <p className="text-xs text-slate-400 mt-1">Giao cho: {task.assignee}</p>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-2xl w-full max-w-md">
                                <h3 className="font-bold mb-4">Task mới</h3>
                                <input className="w-full p-2 border rounded mb-4" placeholder="Tên việc..." value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)} />
                                <button onClick={async () => {
                                    const path = `artifacts/${appId}/public/data/team_tasks`;
                                    await addDoc(collection(db, path), {
                                        title: newTaskTitle,
                                        assignee: username,
                                        status: 'todo',
                                        createdAt: Date.now()
                                    });
                                    setIsModalOpen(false);
                                    setNewTaskTitle('');
                                }} className="w-full py-2 bg-blue-600 text-white rounded">Lưu</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
